name = "cf-email-api"
main = "src/index.ts"
compatibility_date = "2026-04-08"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
DEFAULT_TTL = "600"
DEFAULT_TTL_UNIT = "seconds"
ENABLE_AI = "true"
REQUIRE_AUTH = "false"

[[kv_namespaces]]
binding = "EMAIL_KV"
id = "055e6d68a3eb4841a282ff679b63026f"

[ai]
binding = "AI"
