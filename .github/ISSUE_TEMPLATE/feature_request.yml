name: 功能建议 / Feature Request
description: 建议新功能或改进现有行为 / Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出建议！请描述你的使用场景和期望效果。
        Welcome to suggest features!

  - type: textarea
    id: problem
    attributes:
      label: 解决什么问题 / Problem to Solve
      description: 描述你遇到的痛点或限制 / What limitation or gap are you running into?
      placeholder: "目前 API 无法做到 ... / Currently the API cannot ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案 / Proposed Solution
      placeholder: "希望能支持 ... / It would help if ..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / Alternatives Considered
      description: 是否有其他解决思路或已尝试的绕过方式？/ Any workarounds you have tried?
    validations:
      required: false
