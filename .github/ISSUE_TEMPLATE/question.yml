name: Question
description: Ask about deployment, configuration, or usage
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Please check the [README](../README.md) and [existing issues](../../issues?q=is%3Aissue) before asking.

  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Deployment (wrangler / Cloudflare button)
        - Email Routing configuration
        - KV / storage
        - Auth (REQUIRE_AUTH)
        - Verification code extraction
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: What have you tried?
      description: Share your wrangler.toml config (remove sensitive values), curl output, or logs if relevant.
    validations:
      required: false
